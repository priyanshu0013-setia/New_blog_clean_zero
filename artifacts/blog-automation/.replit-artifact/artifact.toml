kind = "web"
previewPath = "/"
title = "Blog Automation"
version = "1.0.0"
id = "artifacts/blog-automation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25601

[services.development]
run = "pnpm --filter @workspace/blog-automation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blog-automation", "run", "build" ]
publicDir = "artifacts/blog-automation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25601"
BASE_PATH = "/"
