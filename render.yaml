---
# Render deployment configuration for Blog Automator
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: blog-automator
    runtime: node
    # Build both the React frontend and the Express API server.
    # pnpm install installs all workspace dependencies.
    # pnpm -r run build builds each workspace package (vite for frontends, esbuild for API).
    # We skip the root typecheck step here because Render's environment may differ
    # from development (e.g. different Node version) and a typecheck failure would
    # prevent the frontend from being built even if the code is functionally correct.
    buildCommand: pnpm install && pnpm --filter @workspace/db run push && pnpm -r --if-present run build
    # Start the Express server from the repo root so that
    # the binary can be found at ./artifacts/api-server/dist/index.mjs.
    # Static files are resolved relative to __dirname (the binary's directory),
    # so the working directory does not affect frontend serving.
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      # BASE_PATH is read by vite.config.ts at build time.
      # "/" means the app is served at the root of the domain.
      - key: BASE_PATH
        value: /
      # Render injects PORT automatically — do NOT set it manually.

      # ── Required ──────────────────────────────────────────────────────────────
      # PostgreSQL connection string.  Add a Render Postgres database and link it,
      # or paste the external connection URL manually.
      - key: DATABASE_URL
        sync: false

      # Anthropic API key — used by the blog-writing pipeline.
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Optional ──────────────────────────────────────────────────────────────
      # Override the path to the built React static files.
      # Defaults to <repo-root>/artifacts/blog-automation/dist/public, which is
      # correct for a standard Render deployment — only set this if you move the
      # frontend build output to a different location.
      # - key: STATIC_FILES_PATH
      #   value: ./artifacts/blog-automation/dist/public

      # Copyleaks plagiarism-check credentials (pipeline skips check if absent).
      - key: COPYLEAKS_EMAIL
        sync: false
      - key: COPYLEAKS_API_KEY
        sync: false

      # Google Docs integration — paste the full service account JSON as a string.
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      # Google Drive folder ID to publish docs into (optional).
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false

databases:
  # Provision a free Render Postgres instance and link it to the service above.
  # Render will automatically inject DATABASE_URL into the web service.
  - name: blog-automator-db
    plan: free
    databaseName: blog_automator
    user: blog_automator
